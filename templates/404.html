<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — VTCH Terminal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚠️</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #ff003c;
      --red-dim:   #880020;
      --red-dark:  #1a0008;
      --green:     #00ff41;
      --green-dim: #00aa2a;
      --amber:     #ffb700;
      --bg:        #07000d;
      --bg2:       #0d0014;
      --border:    #ff003c33;
      --scanline:  rgba(255,0,60,0.025);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* CRT scanline */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
      pointer-events: none; z-index: 9999;
    }
    /* vignette */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, #000 100%);
      pointer-events: none; z-index: 9998;
    }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* topbar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .logo {
      font-family: 'VT323', monospace; font-size: 26px;
      color: var(--red); letter-spacing: 4px;
      text-shadow: 0 0 12px var(--red);
      position: relative; display: inline-block;
    }
    /* glitch */
    .logo::before, .logo::after {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%;
    }
    .logo::before { color: var(--amber); clip-path: polygon(0 30%,100% 30%,100% 50%,0 50%); animation: g1 3s infinite; }
    .logo::after  { color: #ff88aa;      clip-path: polygon(0 60%,100% 60%,100% 80%,0 80%); animation: g2 3s infinite; }
    @keyframes g1 { 0%,90%,100%{transform:none;opacity:0} 92%{transform:translateX(-4px);opacity:.9} 94%{transform:translateX(4px);opacity:.9} 96%{transform:none;opacity:0} }
    @keyframes g2 { 0%,88%,100%{transform:none;opacity:0} 90%{transform:translateX(4px);opacity:.7} 93%{transform:translateX(-2px);opacity:.7} 96%{transform:none;opacity:0} }

    .dot-red {
      display: inline-block; width: 8px; height: 8px;
      background: var(--red); border-radius: 50%;
      margin-right: 6px; box-shadow: 0 0 6px var(--red);
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    #topbar .meta { font-size: 11px; color: var(--red-dim); text-align: right; line-height: 1.6; }

    /* terminal body */
    #terminal {
      flex: 1; overflow-y: auto;
      padding: 14px 20px 8px;
      display: flex; flex-direction: column;
      scrollbar-width: thin; scrollbar-color: var(--red-dim) transparent;
    }
    #terminal::-webkit-scrollbar { width: 4px; }
    #terminal::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 2px; }

    /* line types */
    .line { line-height: 1.75; white-space: pre-wrap; word-break: break-all; }
    .line.sys    { color: var(--red-dim); }
    .line.out    { color: var(--red); }
    .line.dim    { color: #3d0015; }
    .line.warn   { color: var(--amber); }
    .line.ok     { color: var(--green); text-shadow: 0 0 6px #00ff4166; }
    .line.header {
      font-family: 'VT323', monospace; font-size: 20px;
      color: var(--red); text-shadow: 0 0 10px var(--red); letter-spacing: 2px;
    }
    .line.big {
      font-family: 'VT323', monospace;
      font-size: clamp(60px, 14vw, 110px);
      color: var(--red);
      text-shadow: 0 0 20px var(--red), 0 0 50px #ff003c44;
      line-height: 1;
      animation: flicker 5s infinite;
    }
    @keyframes flicker {
      0%,18%,20%,52%,54%,100% { opacity: 1; }
      19%,53% { opacity: .6; }
    }
    .line a { color: var(--green); text-decoration: none; }
    .line a:hover { text-shadow: 0 0 8px var(--green); text-decoration: underline; }

    /* fake input row at bottom */
    #input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    #prompt-label {
      color: var(--red); white-space: nowrap;
      text-shadow: 0 0 6px var(--red); user-select: none;
    }
    #cursor-block {
      display: inline-block; width: 9px; height: 16px;
      background: var(--red); animation: cur 1s step-start infinite;
    }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

    /* status bar */
    #statusbar {
      display: flex; justify-content: space-between;
      padding: 3px 20px;
      background: var(--red-dim);
      font-size: 11px; color: var(--bg);
      flex-shrink: 0;
    }

    @media(max-width:600px) {
      #topbar .meta { display: none; }
      body { font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="logo" data-text="[ VTCH ]">[ VTCH ]</div>
    <div class="meta">
      <span class="dot-red"></span>ERROR &nbsp;|&nbsp; <span id="clock"></span>
    </div>
  </div>

  <div id="terminal"></div>

  <div id="input-row">
    <span id="prompt-label">vtch@api:~$</span>
    &nbsp;
    <span id="cursor-block"></span>
  </div>

  <div id="statusbar">
    <span>VTCH-API v1.0.0 | Flask</span>
    <span>EXIT CODE: 404</span>
  </div>

</div>
<script>
'use strict';

const term = document.getElementById('terminal');

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleString('id-ID', { hour12: false });
}
tick(); setInterval(tick, 1000);

function addLine(text, cls = 'out', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'line ' + cls;
      if (text.includes('<a ')) el.innerHTML = text;
      else el.textContent = text;
      term.appendChild(el);
      term.scrollTop = term.scrollHeight;
      resolve();
    }, delay);
  });
}

function blank(delay = 0) { return addLine('', 'out', delay); }

async function typeWriter(el, text, speed = 35) {
  return new Promise(resolve => {
    let i = 0;
    const iv = setInterval(() => {
      el.textContent += text[i++];
      term.scrollTop = term.scrollHeight;
      if (i >= text.length) { clearInterval(iv); resolve(); }
    }, speed);
  });
}

async function boot() {
  const lines = [
    { t: 'vtch@api:~$ GET /unknown-path HTTP/1.1',                cls: 'sys',  d: 0   },
    { t: 'Resolving host...',                                      cls: 'dim',  d: 180 },
    { t: 'Connecting to vtch-api.vercel.app...',                   cls: 'dim',  d: 340 },
    { t: 'Connected.',                                             cls: 'dim',  d: 500 },
    { t: 'Sending request...',                                     cls: 'dim',  d: 660 },
  ];

  for (const l of lines) {
    await addLine(l.t, l.cls, l.d);
  }

  await blank(820);

  // big 404
  await addLine('404', 'big', 900);
  await blank(1050);

  // error header
  const h = document.createElement('div');
  h.className = 'line header';
  term.appendChild(h);
  await typeWriter(h, '[ ERROR ] ENDPOINT NOT FOUND', 28);
  await new Promise(r => setTimeout(r, 200));
  await addLine('─────────────────────────────────────────────────', 'dim');
  await blank();

  const seq = [
    { t: '  STATUS   : 404 Not Found',                                     cls: 'out' },
    { t: '  PATH     : ' + window.location.pathname,                        cls: 'warn'},
    { t: '  MESSAGE  : Halaman ini tidak ada di server VTCH.',              cls: 'out' },
  ];
  for (const s of seq) { await addLine(s.t, s.cls); }

  await blank();
  await addLine('─────────────────────────────────────────────────', 'dim');
  await addLine('  SARAN:', 'sys');
  await addLine('─────────────────────────────────────────────────', 'dim');

  const tips = [
    '  Cek kembali URL yang kamu akses.',
    '  Gunakan /api untuk melihat daftar endpoint tersedia.',
    '  Kembali ke terminal utama: /',
  ];
  for (const t of tips) { await addLine(t, 'out'); }

  await blank();
  await addLine('─────────────────────────────────────────────────', 'dim');
  await addLine('  AKSI CEPAT:', 'sys');
  await addLine('─────────────────────────────────────────────────', 'dim');
  await blank();

  await addLine(
    '  <a href="/">⬅  Kembali ke Terminal Utama</a>',
    'out'
  );
  await addLine(
    '  <a href="/api">📋 Lihat Daftar Endpoint API</a>',
    'out'
  );

  await blank();
  await addLine('─────────────────────────────────────────────────', 'dim');
  await addLine('  vtch@api — "Code. Hack. Evolve."', 'dim');
}

boot();
</script>
</body>
</html>
