<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTCH — Terminal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00ff41;
      --green-dim:  #00aa2a;
      --green-dark: #003b0f;
      --red:        #ff003c;
      --amber:      #ffb700;
      --cyan:       #00eeff;
      --bg:         #020c02;
      --bg2:        #030f03;
      --border:     #00ff4133;
      --scanline:   rgba(0,255,65,0.025);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* CRT scanline */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
      pointer-events: none; z-index: 9999;
    }
    /* vignette */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, #000 100%);
      pointer-events: none; z-index: 9998;
    }

    /* ══════════════════════════════════════════
       WELCOME MODAL
    ══════════════════════════════════════════ */
    #welcome-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
      animation: fade-in .3s ease;
    }
    @keyframes fade-in { from{opacity:0} to{opacity:1} }

    #welcome-box {
      border: 1px solid var(--green);
      background: var(--bg2);
      padding: 36px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      position: relative;
      box-shadow: 0 0 40px #00ff4122, 0 0 80px #00ff4108;
      animation: slide-up .35s ease;
    }
    @keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

    #welcome-box::before {
      content: '';
      position: absolute; inset: -1px;
      background: linear-gradient(135deg, var(--green) 0%, transparent 50%, var(--green) 100%);
      z-index: -1; opacity: .15;
    }

    .w-logo {
      font-family: 'VT323', monospace;
      font-size: 52px;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px #00ff4155;
      letter-spacing: 6px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .w-tagline {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .w-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 20px;
    }

    .w-title {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--green);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .w-desc {
      font-size: 13px;
      color: var(--green-dim);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .w-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .w-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border: 1px solid;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .2s;
    }

    .w-btn-wa {
      color: #25d366;
      border-color: #25d36655;
      background: #25d36608;
    }
    .w-btn-wa:hover {
      background: #25d366;
      color: #000;
      box-shadow: 0 0 16px #25d36655;
      border-color: #25d366;
    }

    .w-btn-tg {
      color: #29a9eb;
      border-color: #29a9eb55;
      background: #29a9eb08;
    }
    .w-btn-tg:hover {
      background: #29a9eb;
      color: #000;
      box-shadow: 0 0 16px #29a9eb55;
      border-color: #29a9eb;
    }

    .w-skip {
      font-size: 11px;
      color: var(--green-dark);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none; border: none;
      font-family: 'Share Tech Mono', monospace;
      transition: color .2s;
    }
    .w-skip:hover { color: var(--green-dim); }

    /* ══════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════ */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* topbar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .logo {
      font-family: 'VT323', monospace; font-size: 26px;
      color: var(--green); letter-spacing: 4px;
      text-shadow: 0 0 12px var(--green);
      position: relative; display: inline-block;
    }
    .logo::before, .logo::after {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%;
    }
    .logo::before { color:var(--red); clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%); animation:glitch1 4s infinite; }
    .logo::after  { color:var(--cyan); clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%); animation:glitch2 4s infinite; }
    @keyframes glitch1 { 0%,90%,100%{transform:none;opacity:0} 92%{transform:translateX(-3px);opacity:.8} 94%{transform:translateX(3px);opacity:.8} 96%{transform:none;opacity:0} }
    @keyframes glitch2 { 0%,88%,100%{transform:none;opacity:0} 90%{transform:translateX(3px);opacity:.7} 93%{transform:translateX(-2px);opacity:.7} 96%{transform:none;opacity:0} }

    .dot {
      display:inline-block; width:8px; height:8px;
      background:var(--green); border-radius:50%;
      margin-right:6px; box-shadow:0 0 6px var(--green);
      animation:blink-dot 1.2s infinite;
    }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:.2} }
    #topbar .meta { font-size:11px; color:var(--green-dim); text-align:right; line-height:1.6; }

    /* terminal */
    #terminal {
      flex:1; overflow-y:auto;
      padding:14px 20px 6px;
      display:flex; flex-direction:column;
      scrollbar-width:thin; scrollbar-color:var(--green-dark) transparent;
    }
    #terminal::-webkit-scrollbar { width:4px; }
    #terminal::-webkit-scrollbar-thumb { background:var(--green-dark); border-radius:2px; }

    /* line types */
    .line { line-height:1.75; white-space:pre-wrap; word-break:break-all; }
    .line.system   { color:var(--green-dim); }
    .line.output   { color:var(--green); }
    .line.error    { color:var(--red); }
    .line.warn     { color:var(--amber); }
    .line.success  { color:var(--green); text-shadow:0 0 6px #00ff4166; }
    .line.json     { color:#7fffb3; font-size:12.5px; }
    .line.dim      { color:var(--green-dark); }
    .line.header   { font-family:'VT323',monospace; font-size:20px; color:var(--green); text-shadow:0 0 10px var(--green); letter-spacing:2px; }
    .line.cmd-echo { color:var(--green-dim); }
    .line a { color:var(--amber); text-decoration:none; }
    .line a:hover  { text-shadow:0 0 8px var(--amber); text-decoration:underline; }

    /* inline form */
    .ep-form {
      margin:6px 0 4px; padding:10px 14px;
      border:1px solid var(--border); background:#030f0388;
      display:flex; flex-direction:column; gap:7px; max-width:540px;
    }
    .ep-form-title { color:var(--green-dim); font-size:12px; margin-bottom:2px; }
    .ep-form-row   { display:flex; gap:10px; align-items:center; }
    .ep-form-row label { color:var(--green-dim); width:90px; flex-shrink:0; font-size:12px; }
    .ep-form-row input {
      flex:1; background:#010a01; border:1px solid var(--border);
      color:var(--green); font-family:'Share Tech Mono',monospace;
      font-size:13px; padding:4px 8px; outline:none;
    }
    .ep-form-row input:focus { border-color:var(--green-dim); }
    .ep-form-actions { display:flex; gap:8px; margin-top:2px; }
    .ep-btn {
      background:transparent; border:1px solid var(--green);
      color:var(--green); font-family:'Share Tech Mono',monospace;
      font-size:12px; padding:4px 14px; cursor:pointer; letter-spacing:1px;
      transition:background .15s,color .15s;
    }
    .ep-btn:hover { background:var(--green); color:#000; }
    .ep-btn.cancel { border-color:var(--green-dim); color:var(--green-dim); }
    .ep-btn.cancel:hover { background:var(--green-dim); color:#000; }
    .ep-result { font-size:12px; min-height:16px; }

    /* input row */
    #input-row {
      display:flex; align-items:center; gap:8px;
      padding:10px 20px 14px;
      border-top:1px solid var(--border);
      background:var(--bg2); flex-shrink:0;
    }
    #prompt-label {
      color:var(--green); white-space:nowrap;
      text-shadow:0 0 6px var(--green); user-select:none;
    }
    #cmd-input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--green); font-family:'Share Tech Mono',monospace;
      font-size:14px; caret-color:var(--green);
    }
    #cmd-input::placeholder { color:#00552066; }
    #cursor-block {
      display:inline-block; width:9px; height:16px;
      background:var(--green); animation:cur-blink 1s step-start infinite;
      vertical-align:middle;
    }
    @keyframes cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* status bar */
    #statusbar {
      display:flex; justify-content:space-between;
      padding:3px 20px;
      background:var(--green-dark);
      font-size:11px; color:var(--bg2); flex-shrink:0;
    }

    /* ── SEARCHING / LOADER ANIMATION ── */
    .loader-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--green-dim);
      font-size: 13px;
      line-height: 1.75;
      padding-left: 2px;
    }

    /* spinner: rotating braille dots */
    .spinner {
      display: inline-block;
      width: 14px;
      text-align: center;
      animation: spin-frames .7s steps(1) infinite;
      color: var(--green);
      font-size: 15px;
    }
    @keyframes spin-frames {
      0%   { content: '⠋'; }
      12%  { content: '⠙'; }
      25%  { content: '⠹'; }
      37%  { content: '⠸'; }
      50%  { content: '⠼'; }
      62%  { content: '⠴'; }
      75%  { content: '⠦'; }
      87%  { content: '⠧'; }
    }
    /* use JS to cycle the chars since CSS content on span isn't reliable cross-browser */

    .loader-text {
      color: var(--green-dim);
      overflow: hidden;
      white-space: nowrap;
    }

    /* animated dots after loader text */
    .loader-dots::after {
      content: '';
      animation: dot-cycle 1.2s steps(4, end) infinite;
    }
    @keyframes dot-cycle {
      0%   { content: '';    }
      25%  { content: '.';   }
      50%  { content: '..';  }
      75%  { content: '...'; }
    }

    /* progress bar under loader */
    .loader-bar-wrap {
      height: 2px;
      width: 220px;
      background: var(--green-dark);
      margin-left: 24px;
      overflow: hidden;
      border-radius: 1px;
    }
    .loader-bar {
      height: 100%;
      width: 40%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: bar-slide 1s ease-in-out infinite alternate;
      border-radius: 1px;
    }
    @keyframes bar-slide {
      0%   { transform: translateX(0); }
      100% { transform: translateX(360%); }
    }

    /* input row searching state */
    #input-row.searching #prompt-label {
      color: var(--amber);
      text-shadow: 0 0 6px var(--amber);
    }
    #input-row.searching {
      border-top-color: var(--amber);
    }

    @media(max-width:600px) {
      #topbar .meta { display:none; }
      body { font-size:13px; }
      #welcome-box { padding:28px 24px; }
      .w-logo { font-size:42px; }
    }
  </style>
</head>
<body>

    </div>
    <div class="w-buttons">

        Join Grup Telegram
      </a>
    </div>
    <button class="w-skip" onclick="closeWelcome()">[ Lewati → Masuk Terminal ]</button>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app">

  <div id="topbar">
    <div class="logo" data-text="[ VTCH ]">[ VTCH ]</div>
    <div class="meta">
      <span class="dot"></span>ONLINE &nbsp;|&nbsp; <span id="clock"></span>
    </div>
  </div>

  <div id="terminal" aria-live="polite"></div>

  <div id="input-row">
    <span id="prompt-label">vtch@api:~$</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="ketik 'help' atau nama endpoint..."/>
    <span id="cursor-block"></span>
  </div>

  <div id="statusbar">
    <span>VTCH-API v1.0.0 | Flask + Python</span>
    <span id="sb-right">ready</span>
  </div>

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────────────────────── */
const LINKS = {
  whatsapp: 'https://whatsapp.com/channel/0029VbAuMhOJP20yKWguw61k',
  telegram:  'https://t.me/+NlHuKTzhZbRkMTJl'
};

/* ── Welcome modal ───────────────────────────────────────────────────────────── */
function closeWelcome() {
  const overlay = document.getElementById('welcome-overlay');
  overlay.style.transition = 'opacity .3s';
  overlay.style.opacity    = '0';
  setTimeout(() => { overlay.remove(); input.focus(); }, 300);
}

// Tutup saat klik di luar box
document.getElementById('welcome-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeWelcome();
});

/* ── Endpoint meta cache ─────────────────────────────────────────────────────── */
let endpointsMeta = [];

async function fetchMeta() {
  try {
    const r = await fetch('/api');
    const d = await r.json();
    endpointsMeta = d.endpoints || [];
  } catch(e) {
    endpointsMeta = [];
  }
}

/* ── DOM ─────────────────────────────────────────────────────────────────────── */
const term  = document.getElementById('terminal');
const input = document.getElementById('cmd-input');

/* ── Clock ───────────────────────────────────────────────────────────────────── */
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleString('id-ID', { hour12: false });
}
tick(); setInterval(tick, 1000);

/* ── Print helpers ───────────────────────────────────────────────────────────── */
function addLine(html, cls = 'output') {
  const el = document.createElement('div');
  el.className = 'line ' + cls;
  // Jika ada tag <a>, pakai innerHTML; lainnya textContent (XSS safe)
  if (html.includes('<a ')) el.innerHTML = html;
  else el.textContent = html;
  term.appendChild(el);
  term.scrollTop = term.scrollHeight;
  return el;
}

function blank() { addLine(''); }

function printJSON(obj) {
  JSON.stringify(obj, null, 2).split('\n').forEach(l => addLine('  ' + l, 'json'));
}

/* ── Searching / Loader animation ───────────────────────────────────────────── */
const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
let   loaderEl   = null;
let   loaderTimer = null;
let   spinnerTimer = null;

const LOADER_MESSAGES = [
  'Searching endpoint',
  'Fetching data',
  'Processing request',
  'Connecting to server',
  'Reading data',
];

function showLoader(msg) {
  // Disable input saat loading
  input.disabled = true;
  document.getElementById('input-row').classList.add('searching');
  document.getElementById('prompt-label').textContent = 'vtch@api [searching]:~$';

  // Buat elemen loader
  const wrap = document.createElement('div');
  wrap.id = 'active-loader';

  const line1 = document.createElement('div');
  line1.className = 'loader-line';

  const spinEl = document.createElement('span');
  spinEl.className = 'spinner';
  spinEl.textContent = SPINNER_FRAMES[0];

  const txtEl = document.createElement('span');
  txtEl.className   = 'loader-text loader-dots';
  txtEl.textContent = msg || LOADER_MESSAGES[Math.floor(Math.random() * LOADER_MESSAGES.length)];

  line1.appendChild(spinEl);
  line1.appendChild(txtEl);
  wrap.appendChild(line1);

  const barWrap = document.createElement('div');
  barWrap.className = 'loader-bar-wrap';
  const bar = document.createElement('div');
  bar.className = 'loader-bar';
  barWrap.appendChild(bar);
  wrap.appendChild(barWrap);

  term.appendChild(wrap);
  term.scrollTop = term.scrollHeight;
  loaderEl = wrap;

  // Spin the spinner
  let fi = 0;
  spinnerTimer = setInterval(() => {
    fi = (fi + 1) % SPINNER_FRAMES.length;
    spinEl.textContent = SPINNER_FRAMES[fi];
  }, 80);
}

function hideLoader() {
  clearInterval(spinnerTimer);
  if (loaderEl) { loaderEl.remove(); loaderEl = null; }
  input.disabled = false;
  input.focus();
  document.getElementById('input-row').classList.remove('searching');
  document.getElementById('prompt-label').textContent = 'vtch@api:~$';
}

/* ── Command history ─────────────────────────────────────────────────────────── */
let cmdHistory = [], histIdx = -1;

input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) histIdx++;
    input.value = cmdHistory[histIdx] || '';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    histIdx = Math.max(-1, histIdx - 1);
    input.value = histIdx >= 0 ? cmdHistory[histIdx] : '';
  }
});

/* ── Main input handler ──────────────────────────────────────────────────────── */
input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const raw = input.value.trim();
  if (!raw) return;

  cmdHistory.unshift(raw);
  histIdx     = -1;
  input.value = '';

  addLine('vtch@api:~$ ' + raw, 'cmd-echo');
  blank();

  const cmd = raw.split(/\s+/)[0].toLowerCase();

  // Animasi search di SEMUA command saat Enter
  showLoader();
  await new Promise(r => setTimeout(r, 520));  // biar keliatan animasinya
  hideLoader();

  if (cmd === 'clear') {
    term.innerHTML = '';
    await boot();                               // tampilkan home awal
  } else if (cmd === 'help') {
    await showHelp();
  } else if (cmd === 'info') {
    showInfo();
  } else {
    const meta = endpointsMeta.find(m => m.endpoint === `/api/${cmd}`);
    if (meta) await executeEndpoint(meta);
    else addLine(`  perintah tidak ditemukan: "${cmd}". Ketik 'help'.`, 'error');
  }
  blank();
});

/* ── HELP — list dari endpoint meta ─────────────────────────────────────────── */
async function showHelp() {
  await fetchMeta();

  // Banner rapi — CSS border, bebas dari masalah lebar karakter
  const bannerEl = document.createElement('div');
  bannerEl.style.cssText = 'border:1px solid #003b0f; padding:5px 14px; margin:2px 0 4px; display:inline-block; color:var(--green); font-family:\'VT323\',monospace; font-size:20px; letter-spacing:2px; text-shadow:0 0 10px var(--green);';
  bannerEl.textContent = 'VTCH TERMINAL — HELP MENU';
  term.appendChild(bannerEl);
  term.scrollTop = term.scrollHeight;
  blank();

  addLine('  PERINTAH BUILT-IN:', 'system');
  addLine('  help          — tampilkan menu ini', 'output');
  addLine('  info          — info komunitas VTCH', 'output');
  addLine('  clear         — bersihkan terminal', 'output');
  blank();

  addLine('  ENDPOINT API  (ketik nama untuk execute):', 'system');

  if (endpointsMeta.length === 0) {
    addLine('  (gagal memuat — pastikan Flask berjalan)', 'error');
    return;
  }

  endpointsMeta.forEach(ep => {
    const key    = ep.endpoint.replace('/api/', '');
    const method = ('[' + ep.method + ']').padEnd(7);
    const params = ep.params.length
      ? '  params: ' + ep.params.map(p => (p.required ? '*' : '') + p.key).join(', ')
      : '';
    addLine(`  ${key.padEnd(12)} ${method}  ${ep.description}${params}`, 'success');
  });

  blank();
  addLine('  * = wajib diisi', 'dim');
}

/* ── Execute endpoint ────────────────────────────────────────────────────────── */
async function executeEndpoint(meta) {
  const method = meta.method.toUpperCase();
  const params = meta.params || [];

  addLine(`  [ ${method} ] ${meta.endpoint}`, 'system');
  addLine(`  ${meta.description}`, 'dim');
  blank();

  if (params.length === 0) {
    await callAPI(meta.endpoint, method, {});
  } else {
    renderForm(meta);
  }
}

/* ── Form inline di terminal ─────────────────────────────────────────────────── */
function renderForm(meta) {
  const method = meta.method.toUpperCase();
  const params = meta.params || [];

  const form = document.createElement('div');
  form.className = 'ep-form';

  const title = document.createElement('div');
  title.className   = 'ep-form-title';
  title.textContent = `── ${method} ${meta.endpoint} ──`;
  form.appendChild(title);

  const inputs = {};
  params.forEach(p => {
    const row = document.createElement('div');
    row.className = 'ep-form-row';

    const lbl = document.createElement('label');
    lbl.textContent = (p.required ? '* ' : '  ') + p.label;
    row.appendChild(lbl);

    const inp = document.createElement('input');
    inp.type        = 'text';
    inp.placeholder = p.required ? '(wajib)' : '(opsional)';
    inp.dataset.key = p.key;
    row.appendChild(inp);

    inputs[p.key] = inp;
    form.appendChild(row);
  });

  const actions = document.createElement('div');
  actions.className = 'ep-form-actions';

  const btnSend = document.createElement('button');
  btnSend.className   = 'ep-btn';
  btnSend.textContent = '▶ KIRIM';
  actions.appendChild(btnSend);

  const btnCancel = document.createElement('button');
  btnCancel.className   = 'ep-btn cancel';
  btnCancel.textContent = '✕ Batal';
  actions.appendChild(btnCancel);

  form.appendChild(actions);

  const resultEl = document.createElement('div');
  resultEl.className = 'ep-result';
  form.appendChild(resultEl);

  term.appendChild(form);
  term.scrollTop = term.scrollHeight;

  // Focus input pertama
  const firstInp = form.querySelector('input');
  if (firstInp) firstInp.focus();

  async function doSend() {
    const body = {};
    let valid  = true;

    params.forEach(p => {
      const val = inputs[p.key].value.trim();
      if (p.required && !val) {
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = `⚠ "${p.label}" wajib diisi!`;
        valid = false;
      } else {
        body[p.key] = val;
      }
    });
    if (!valid) return;

    resultEl.style.color = 'var(--green-dim)';
    resultEl.textContent = '↺ Mengirim...';
    btnSend.disabled = true;

    try {
      let url = meta.endpoint, opts = {};

      if (method === 'GET') {
        const qs = new URLSearchParams(body).toString();
        if (qs) url += '?' + qs;
        opts = { method: 'GET' };
      } else {
        opts = {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        };
      }

      const res  = await fetch(url, opts);
      const data = await res.json();

      form.remove();
      blank();
      addLine(`  ✓ Response [${res.status}]:`, 'success');
      renderResponse(meta.endpoint, data);

    } catch(err) {
      resultEl.style.color = 'var(--red)';
      resultEl.textContent = '✗ Error: ' + err.message;
      btnSend.disabled = false;
    }
    term.scrollTop = term.scrollHeight;
  }

  btnSend.addEventListener('click', doSend);
  btnCancel.addEventListener('click', () => {
    form.remove();
    addLine('  Dibatalkan.', 'dim');
    blank();
    input.focus();
  });

  Object.values(inputs).forEach((inp, i, arr) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (i < arr.length - 1) arr[i + 1].focus();
        else doSend();
      }
    });
  });
}

/* ── Call API (tanpa form) ───────────────────────────────────────────────────── */
async function callAPI(endpoint, method, body) {
  try {
    let url = endpoint, opts = {};

    if (method === 'GET') {
      const qs = new URLSearchParams(body).toString();
      if (qs) url += '?' + qs;
      opts = { method: 'GET' };
    } else {
      opts = {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      };
    }

    const res  = await fetch(url, opts);
    const data = await res.json();

    addLine(`  ✓ Response [${res.status}]:`, 'success');
    renderResponse(endpoint, data);

  } catch(err) {
    addLine('  ✗ Error: ' + err.message, 'error');
  }
}

/* ── Render response (contact dapat link klik) ───────────────────────────────── */
function renderResponse(endpoint, data) {
  if (endpoint === '/api/contact' && data.data) {
    const d = data.data;
    addLine('  {', 'json');
    if (d.whatsapp) {
      addLine(`    "whatsapp": {`, 'json');
      addLine(`      "label": "${d.whatsapp.label}",`, 'json');
      addLine(
        `      "url": <a href="${d.whatsapp.url}" target="_blank" rel="noopener">"${d.whatsapp.url}"</a>`,
        'json'
      );
      addLine(`    },`, 'json');
    }
    if (d.telegram) {
      addLine(`    "telegram": {`, 'json');
      addLine(`      "label": "${d.telegram.label}",`, 'json');
      addLine(
        `      "url": <a href="${d.telegram.url}" target="_blank" rel="noopener">"${d.telegram.url}"</a>`,
        'json'
      );
      addLine(`    }`, 'json');
    }
    addLine('  }', 'json');
  } else {
    printJSON(data);
  }
}

/* ── Info built-in ───────────────────────────────────────────────────────────── */
function showInfo() {
  addLine('  VTCH — Virtual Tech Community Hub', 'header');
  blank();
  addLine('  Motto  : Code. Hack. Evolve.', 'output');
  addLine('  Focus  : Programming, Hacking, Tech, Networking', 'output');
  blank();
  addLine(
    `  WhatsApp : <a href="${LINKS.whatsapp}" target="_blank" rel="noopener">${LINKS.whatsapp}</a>`,
    'output'
  );
  addLine(
    `  Telegram : <a href="${LINKS.telegram}" target="_blank" rel="noopener">${LINKS.telegram}</a>`,
    'output'
  );
}

  addLine(

  );

    `  Telegram  : <a href="${LINKS.telegram}" target="_blank" rel="noopener">${LINKS.telegram}</a>`,
    'output'
  );

  addLine('─────────────────────────────────────────────────', 'dim');
  addLine('  ENDPOINT TERSEDIA:', 'system');

  if (endpointsMeta.length > 0) {

  }

  addLine('─────────────────────────────────────────────────', 'dim');
  blank();
  addLine("  Ketik nama endpoint untuk execute, atau 'help' untuk detail.", 'warn');
  blank();
}

boot();
